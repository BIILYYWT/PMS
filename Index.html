<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Inventory System</title>
		<script type="text/javascript" src="src/main.js"></script>
		<link rel="stylesheet" href="styles/styles.css" />
	</head>
	<body>
		<h1 class="title">Inventory Management</h1>
	   <div class="main">
		   <div class="ft">
			   <form id="addForm">
				   <div>Item ID : <input id="ID" type="text"/><br></div>
				   <div>Item Name : <input id="name" type="text"/><br></div>
				   <div>Category : <select id="category">
					   <option>Electronics</option>
					   <option>Furniture</option>
					   <option>Clothing</option>
					   <option>Tools</option>
					   <option>Miscellaneous</option>
				   </select></div>
				   <div>Quantity : <input id="quantity" type="number" min="0" step="1" /><br></div>
				   <div>Price : <input id="price" type="number" min="0" step="0.01"/><br></div>
				   <div>Supplier Name : <input id="supplierName" type="text"/><br></div>
				   <div>Stock Status : <select id="stockStatus">
					   <option>In Stock</option>
					   <option>Low Stock</option>
					   <option>Out of Stock</option>
				   </select></div>
				   <div>Popular Item : <input id="popularItem" type="checkbox"/></div>
				   <div>Comment : <input id="comment" type="text"/></div>
				   <button type="button" onClick="addOrEdit(true)">Add</button>
				   <button type="button" onClick="addOrEdit(false)">Update</button>
				   <br>
				   <p id="message"><p>
			   </form>
			   <img class="inventory" src="images/system.jpg">
		   </div>
		   <div class="list">
			   <h3>Inventory Items</h3>
			   <ul id="inventoryList"></ul>
		   </div>
		   <div class="list">
			   <h3>Search Items</h3>
			   <input class="i-name" placeholder="Search item name keyword" id="iName"/>
			   <button onclick="handleSearch()">Search</button>
			   <ul id="result"></ul>
		   </div>
		   <div class="list">
			   <h3>Popular Items</h3>
			   <button onclick="displayInventoryPopularData()">Display Popular Items</button>
			   <ul id="Popular"></ul>
		   </div>
	   </div>
	</body>
</html>
